services:

  db:
    image: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - blogverse-network
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./2243223-blogverse-backend:${BACKEND_VERSION:-latest}
      dockerfile: Dockerfile
    image: eliesoualhaci/tp2-2243223-blogverse-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      PORT: 3001
    networks:
      - blogverse-network
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./2243223-blogverse-frontend
      dockerfile: Dockerfile
    image: eliesoualhaci/tp2-2243223-blogverse-frontend
    restart: unless-stopped
    networks:
      - blogverse-network
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:

networks:
  blogverse-network:
    driver: bridge